# BTO Release CI
# 触发条件: push tag v*
# 构建 4 个平台二进制 → 上传 GitHub Releases
#
# 注意: BTO 依赖 PeerLink P2P 库 (p2p-cpp)
# CI 使用 git submodule 或预编译 artifact 获取依赖

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  BUILD_TYPE: Release

jobs:
  # ─── Linux 构建（Docker 交叉编译）─────────────────────────────
  build-linux:
    strategy:
      matrix:
        include:
          - arch: x86_64
            docker_platform: linux/amd64
          - arch: arm64
            docker_platform: linux/arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU (for arm64)
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Build in Docker
        run: |
          docker run --rm --platform ${{ matrix.docker_platform }} \
            -v "$PWD":/workspace -w /workspace \
            ubuntu:22.04 bash -c '
              set -ex
              apt-get update && apt-get install -y --no-install-recommends \
                build-essential cmake pkg-config git \
                libssl-dev libboost-all-dev \
                libprotobuf-dev protobuf-compiler \
                libspdlog-dev libfmt-dev

              # 构建 PeerLink P2P 库（静态）
              cd /workspace/p2p-cpp
              cmake -B build \
                -DCMAKE_BUILD_TYPE=Release \
                -DBUILD_SERVERS=OFF \
                -DBUILD_EXAMPLES=OFF \
                -DBUILD_TESTS=OFF \
                -DBUILD_SHARED_LIBS=OFF
              cmake --build build -j$(nproc)

              # 构建 BTO（静态链接）
              cd /workspace
              cmake -B build \
                -DCMAKE_BUILD_TYPE=Release \
                -DBTO_BUILD_TESTS=OFF \
                -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++"
              cmake --build build -j$(nproc)

              # 验证
              file build/bto
              build/bto --version
            '

      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME}
          FILENAME="bto-${VERSION}-linux-${{ matrix.arch }}.tar.gz"
          tar -czf "$FILENAME" -C build bto peerlinkd
          echo "FILENAME=$FILENAME" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: bto-linux-${{ matrix.arch }}
          path: ${{ env.FILENAME }}

  # ─── macOS 构建 ────────────────────────────────────────────────
  build-macos:
    strategy:
      matrix:
        include:
          - runner: macos-14        # Apple Silicon
            arch: arm64
          - runner: macos-13        # Intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install cmake boost spdlog fmt protobuf openssl

      - name: Build PeerLink P2P
        run: |
          cd p2p-cpp
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SERVERS=OFF \
            -DBUILD_EXAMPLES=OFF \
            -DBUILD_TESTS=OFF \
            -DBUILD_SHARED_LIBS=OFF
          cmake --build build -j$(sysctl -n hw.logicalcpu)

      - name: Build BTO
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBTO_BUILD_TESTS=OFF
          cmake --build build -j$(sysctl -n hw.logicalcpu)
          file build/bto
          build/bto --version

      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME}
          FILENAME="bto-${VERSION}-darwin-${{ matrix.arch }}.tar.gz"
          tar -czf "$FILENAME" -C build bto peerlinkd
          echo "FILENAME=$FILENAME" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: bto-darwin-${{ matrix.arch }}
          path: ${{ env.FILENAME }}

  # ─── 发布 ──────────────────────────────────────────────────────
  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum bto-*.tar.gz > checksums.sha256
          cat checksums.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/bto-*.tar.gz
            artifacts/checksums.sha256
          body: |
            ## 安装

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
            ```

            该安装器会安装 `bto` 与 `peerlinkd`，并在存在 `checksums.sha256` 时自动做 SHA256 校验。

            指定版本:
            ```bash
            curl -fsSL ... | bash -s -- --version ${{ github.ref_name }}
            ```

            ## 支持平台

            | 平台 | 文件 |
            |------|------|
            | Linux x86_64 | `bto-${{ github.ref_name }}-linux-x86_64.tar.gz` |
            | Linux ARM64 | `bto-${{ github.ref_name }}-linux-arm64.tar.gz` |
            | macOS Apple Silicon | `bto-${{ github.ref_name }}-darwin-arm64.tar.gz` |
            | macOS Intel | `bto-${{ github.ref_name }}-darwin-x86_64.tar.gz` |
