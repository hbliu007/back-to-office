<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d0d11"/>
      <stop offset="1" stop-color="#1a1025"/>
    </linearGradient>
    <linearGradient id="glow-purple" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow-green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22c55e" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Glow effects -->
  <circle cx="200" cy="200" r="250" fill="url(#glow-purple)"/>
  <circle cx="1000" cy="200" r="250" fill="url(#glow-green)"/>

  <!-- Grid lines (subtle) -->
  <line x1="0" y1="100" x2="1200" y2="100" stroke="#ffffff" stroke-opacity="0.03"/>
  <line x1="0" y1="200" x2="1200" y2="200" stroke="#ffffff" stroke-opacity="0.03"/>
  <line x1="0" y1="300" x2="1200" y2="300" stroke="#ffffff" stroke-opacity="0.03"/>
  <line x1="300" y1="0" x2="300" y2="400" stroke="#ffffff" stroke-opacity="0.03"/>
  <line x1="600" y1="0" x2="600" y2="400" stroke="#ffffff" stroke-opacity="0.03"/>
  <line x1="900" y1="0" x2="900" y2="400" stroke="#ffffff" stroke-opacity="0.03"/>

  <!-- Left side: Text -->
  <text x="80" y="130" fill="#94a3b8" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="16" letter-spacing="3">REMOTE ACCESS TOOL</text>

  <text x="80" y="190" fill="#ffffff" font-family="Inter, 'Segoe UI', sans-serif" font-size="64" font-weight="800">BTO</text>
  <text x="245" y="190" fill="#6366f1" font-family="Inter, 'Segoe UI', sans-serif" font-size="64" font-weight="300">|</text>
  <text x="275" y="190" fill="#e2e8f0" font-family="Inter, 'Segoe UI', sans-serif" font-size="36" font-weight="400">Back To Office</text>

  <text x="80" y="240" fill="#94a3b8" font-family="Inter, 'Segoe UI', sans-serif" font-size="22">一条命令穿透 NAT，SSH 回你的办公室电脑</text>

  <!-- Pills -->
  <rect x="80" y="270" width="120" height="32" rx="16" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-opacity="0.4"/>
  <text x="108" y="291" fill="#a5b4fc" font-family="Inter, sans-serif" font-size="13" font-weight="500">端到端加密</text>

  <rect x="215" y="270" width="120" height="32" rx="16" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e" stroke-opacity="0.4"/>
  <text x="237" y="291" fill="#86efac" font-family="Inter, sans-serif" font-size="13" font-weight="500">无需公网 IP</text>

  <rect x="350" y="270" width="100" height="32" rx="16" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-opacity="0.4"/>
  <text x="372" y="291" fill="#fcd34d" font-family="Inter, sans-serif" font-size="13" font-weight="500">零配置</text>

  <!-- CTA -->
  <rect x="80" y="330" width="160" height="44" rx="22" fill="#6366f1"/>
  <text x="115" y="358" fill="#ffffff" font-family="Inter, sans-serif" font-size="16" font-weight="600">bto.asia ↗</text>

  <!-- Right side: Terminal -->
  <rect x="680" y="80" width="440" height="240" rx="12" fill="#0f0f14" stroke="#2a2a3a" stroke-width="1.5"/>

  <!-- Terminal header -->
  <circle cx="706" cy="104" r="6" fill="#f87171" fill-opacity="0.8"/>
  <circle cx="726" cy="104" r="6" fill="#fbbf24" fill-opacity="0.8"/>
  <circle cx="746" cy="104" r="6" fill="#4ade80" fill-opacity="0.8"/>
  <text x="850" y="108" text-anchor="middle" fill="#64748b" font-family="'JetBrains Mono', monospace" font-size="12">Terminal</text>

  <!-- Terminal content -->
  <text x="706" y="152" fill="#22c55e" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="15">$</text>
  <text x="724" y="152" fill="#e2e8f0" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="15">curl -fsSL https://bto.asia/install.sh | sh</text>
  <text x="706" y="180" fill="#94a3b8" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="14">  ✓ bto v1.1.7 installed</text>

  <text x="706" y="216" fill="#22c55e" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="15">$</text>
  <text x="724" y="216" fill="#e2e8f0" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="15">bto login</text>
  <text x="706" y="244" fill="#94a3b8" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="14">  ✓ 登录成功</text>

  <text x="706" y="280" fill="#22c55e" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="15">$</text>
  <text x="724" y="280" fill="#e2e8f0" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="15">bto connect office</text>
  <text x="706" y="308" fill="#6366f1" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="14">  ⟡ Connected to office-215 (P2P direct)</text>
</svg>
