  <text x="78" y="482" fill="#FFFFFF" font-family="'Segoe UI', Arial, sans-serif" font-size="42" font-weight="700">This is what BTO is for.</text>
  <text x="78" y="532" fill="#DCE7F3" font-family="'Segoe UI', Arial, sans-serif" font-size="28">You leave the office, but your real coding session is still on the office machine.</text>
  <text x="78" y="570" fill="#DCE7F3" font-family="'Segoe UI', Arial, sans-serif" font-size="28">BTO gets you back onto that machine so Claude Code, terminals, logs, and momentum continue.</text>

